  namespace: r-mlops-k8s-9-1-3-35446443 # Namespace секрета; должен совпадать с namespace InferenceService и ServiceAccount.
  annotations:
    serving.kserve.io/s3-endpoint: storage.yandexcloud.net:443 # Классический адрес для YC
